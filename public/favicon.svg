<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="#0f172a" rx="20"/>

  <!-- Code brackets with neon glow -->
  <g filter="url(#glow)" fill="url(#neonGradient)">
    <!-- Left bracket -->
    <path d="M 35 25 L 25 25 L 25 75 L 35 75" stroke="url(#neonGradient)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Right bracket -->
    <path d="M 65 25 L 75 25 L 75 75 L 65 75" stroke="url(#neonGradient)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Center forward slash -->
    <line x1="55" y1="30" x2="45" y2="70" stroke="url(#neonGradient)" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>