<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GitHub Neon Portfolio</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Converts path to query string so the SPA can handle routing
      const path = window.location.pathname;
      const repo = '/github-neon-portfolio';
      if (path.startsWith(repo)) {
        const route = path.slice(repo.length) || '/';
        const search = window.location.search;
        const hash = window.location.hash;
        window.location.replace(repo + '/?route=' + encodeURIComponent(route + search + hash));
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
