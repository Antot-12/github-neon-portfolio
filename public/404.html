<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GitHub Neon Portfolio</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // Redirects /github-neon-portfolio/analytics to /github-neon-portfolio/?route=/analytics
      var pathSegmentsToKeep = 1; // Keep /github-neon-portfolio
      var l = window.location;
      var pathArray = l.pathname.split('/');
      // Remove empty strings and keep the repo name
      var repo = '/' + pathArray.slice(1, pathSegmentsToKeep + 1).join('/');
      var route = '/' + pathArray.slice(pathSegmentsToKeep + 1).join('/');
      if (route === '/') route = '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repo + '/?p=' + encodeURIComponent(route + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
