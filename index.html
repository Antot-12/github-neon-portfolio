<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Neon Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
          name="description"
          content="Portfolio that showcases all public GitHub repositories with live README previews, filters and stats."
  />
  <meta name="theme-color" content="#0f151c" />

  <meta property="og:title" content="GitHub Neon Portfolio" />
  <meta
          property="og:description"
          content="Browse your public GitHub projects."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="/" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Handle SPA routing redirect from 404.html -->
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const route = params.get('route');
      if (route) {
        params.delete('route');
        const remaining = params.toString();
        const newUrl = route + (remaining ? '?' + remaining : '');
        window.history.replaceState(null, '', newUrl);
      }
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
